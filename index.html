<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .contenedor{
            position: relative; /* Define el marco de referencia */
            display: inline-block; /* Ajusta el div al tamaño de la imagen */
            line-height: 0;
            padding: 0px;
        }

        #canva {
            position: absolute; /* Lo saca del flujo normal */
            top: 0;
            left: 0;
            /* Opcional: para asegurarte de que el canvas no bloquee clics en la imagen */
            pointer-events: none; 
        }
        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="main-container">
    <div class="contenedor visor-circular">
        <img src="cara.jpg"  id="foto" crossorigin="anonymous">
        <video id="video"  width="600" height="600" autoplay muted></video>
        <canvas   id="canva"></canvas>

        
    </div>
    <div class="status-labels">
        <span class="dot detectado"></span> Detectado
        <span class="dot no-detectado"></span> No Detectado
        
    </div>
    
    <div class="menu-controles">
        <input type="text" id="name" placeholder="Escribe tu nombre">
        
        <div class="botones-group">
            <label for="subir-foto" class="btn-secundario">Subir Imagen</label>
            <input type="file" id="subir-foto" accept="image/*" style="display: none;">
            
            <button id="btn" class="btn-principal">Escanear</button>
        </div>
    </div>
    </div>

    <script>
    (async()=> {
        camara=false;
        //conectar con base de datos
      const supabaseUrl = 'https://wktiuldhcukaathrhhih.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrdGl1bGRoY3VrYWF0aHJoaGloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDAxNDIsImV4cCI6MjA5MTM3NjE0Mn0.3_llGZ34epaIPNSyqGry5c2N7-5MD9bLWDLN9h17dCM';
      const sp = supabase.createClient(supabaseUrl, supabaseKey);

        // Cargar los modelos para que face-api funcione correctamente.
        const url = './models';
        // Para descriptores necesitas estos 4 modelos obligatoriamente
        await faceapi.nets.tinyFaceDetector.loadFromUri(url);///opcional solo para tiny
        //await faceapi.loadSsdMobilenetv1Model(url);//pesado para telefonos
        await faceapi.loadFaceLandmarkModel(url); // Mejor usar el normal para descriptores
        await faceapi.loadFaceRecognitionModel(url); // ¡Este es el que reconoce!
       // await faceapi.loadFaceExpressionModel(url); // Opcional, pero recomendado para precisión

      let detec;
        let foto = document.getElementById("foto");
        let video = document.getElementById("video");
        const c = document.getElementById("canva");
        //foto.addEventListener("load", proceso)
        const selectorArchivos = document.getElementById("subir-foto");
        const btn = document.getElementById("btn");

        selectorArchivos.addEventListener("change", (evento) => {
            const archivo = evento.target.files[0]; // Obtenemos el archivo seleccionado
            
            if (archivo) {
              //guarda(archivo.name);
                const lector = new FileReader();
                
                lector.onload = (e) => {
                    // Cuando el lector termina, le pasa el contenido a la imagen
                    foto.src = e.target.result;
                    camara=false;
                    // Al cambiar el src, se disparará automáticamente tu evento 'load'
                    // y se ejecutará la función proceso() que ya tienes.
                };
                
                lector.readAsDataURL(archivo);
            }
        });

        btn.addEventListener('click',preproceso);
        async function preproceso(){
          await proceso();
           //if(detec){alert("se detecto")
             await guarda(document.getElementById("name").value,detec);
           //}else{alert("no se detecto")}
          
        }
        const constraints = {
        video: {
            width: { ideal: 600 },
            height: { ideal: 600 },
            aspectRatio: 1 // Esto le dice al navegador que prefieres un cuadrado
        }
        };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => { video.srcObject = stream; camara=true; })
        .catch(err => console.error("Error al acceder a la cámara:", err));

        async function guarda(n,d) {
            const { data, error } = await sp
            .from('rostros')
            .insert([
                { nombre: n,descriptor:Array.from(d)}
            ]);

            if (error) console.error("Error guardando rostro:", error);
            else alert("¡ rostro guardado en la base de datos!");
    
        }
        async function proceso(){                
            let apros;
            ctx = c.getContext('2d', { willReadFrequently: true });
            // Esto es vital para que las detecciones aparezcan donde deben
            if(camara){
                apros=video
                foto.classList.add("oculto"); video.classList.remove("oculto"); 
            }else{
                apros=foto
                foto.classList.remove("oculto"); video.classList.add("oculto");        
            }
            const displaySize = { width: apros.width, height: apros.height };faceapi.matchDimensions(c, displaySize);

            
            const opciones = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.1 });
            const opcionesTiny = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
            const datos = await faceapi.detectAllFaces(apros,opcionesTiny)      
            .withFaceLandmarks()    
            .withFaceDescriptors()
            //.withFaceExpressions(); 
    if (datos.length > 0) {
        
            detec=datos[0].descriptor;}


            console.log(datos);
            const resizedDetections = faceapi.resizeResults(datos, displaySize);
            //ctx.clearRect(0, 0, c.width, c.height);
            faceapi.draw.drawDetections(c,resizedDetections);//datos
            faceapi.draw.drawFaceLandmarks(c, resizedDetections);
        //  faceapi.draw.drawFaceExpressions(c, datos);
            /*
            Las 7 expresiones detectadas:
            Neutral (Neutral)
            Happy (Felicidad)
            Sad (Tristeza)
            Angry (Enojo)
            Fearful (Miedo)
            Disgusted (Disgusto/Asco)
            Surprised (Sorpresa)*/
        }
        proceso();
    })();


    </script>
</body>
</html>
